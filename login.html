<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Acceso — Softrafing Velocidades</title>
  <link rel="icon" href="Images/Softrafingvel.png" type="image/png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  
  <style>
    :root {
      --bg:           #F3F5F8;
      --surface:      #FFFFFF;
      --border:       #E4E8EE;
      --text:         #0F172A;
      --text-soft:    #475569;
      --text-muted:   #94A3B8;
      --accent:       #F05A1A;
      --accent-hover: #D94E14;
      --r-xl: 18px;
      --shadow-lg: 0 10px 30px rgba(15, 23, 42, 0.08);
      --ease: cubic-bezier(0.16, 1, 0.3, 1);
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }

    .login-card {
      background: var(--surface);
      width: 100%;
      max-width: 400px;
      padding: 40px;
      border-radius: var(--r-xl);
      border: 1px solid var(--border);
      box-shadow: var(--shadow-lg);
      text-align: center;
      animation: slide-up 0.5s var(--ease);
    }

    @keyframes slide-up {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .logo {
      margin-bottom: 24px;
    }
    .logo img {
      height: 80px;
      width: auto;
      margin: 0 auto;
    }

    h1 {
      font-size: 20px;
      font-weight: 800;
      letter-spacing: -0.02em;
      margin-bottom: 8px;
    }

    p {
      font-size: 14px;
      color: var(--text-soft);
      margin-bottom: 32px;
    }

    .form-group {
      text-align: left;
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    input {
      width: 100%;
      height: 48px;
      padding: 0 16px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: #F8FAFC;
      font-family: inherit;
      font-size: 15px;
      color: var(--text);
      transition: all 0.2s var(--ease);
    }

    input:focus {
      outline: none;
      border-color: var(--accent);
      background: #fff;
      box-shadow: 0 0 0 4px rgba(240, 90, 26, 0.1);
    }

    button {
      width: 100%;
      height: 48px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      cursor: pointer;
      transition: all 0.2s var(--ease);
      margin-top: 10px;
    }

    button:hover { background: var(--accent-hover); transform: translateY(-1px); }
    button:active { transform: translateY(0); }
    button:disabled { opacity: 0.5; cursor: not-allowed; }

    #error-msg {
      margin-top: 16px;
      padding: 12px;
      background: #FFF1F2;
      color: #E11D48;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      display: none;
    }

    .footer {
      margin-top: 32px;
      font-size: 11px;
      color: var(--text-muted);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>

  <div class="login-card">
    <div class="logo">
      <img src="Images/Softrafingvel.png" alt="Softrafing Velocidades">
    </div>
    <h1>Acceso Corporativo</h1>
    <p>Ingresa tus credenciales de Trafing Ingeniería</p>

    <form id="login-form">
      <div class="form-group">
        <label for="email">Correo Electrónico</label>
        <input type="email" id="email" required placeholder="tu@trafing.com">
      </div>
      <div class="form-group">
        <label for="password">Contraseña</label>
        <input type="password" id="password" required placeholder="••••••••">
      </div>
      <button type="submit" id="submit-btn">Entrar</button>
      <div id="error-msg"></div>
    </form>

    <div class="footer">NextCan Tráfico — 2026</div>
  </div>

  <script type="module">
    import { login, checkAuth } from './lib/auth.js';

    // Si ya está logueado, redirigir
    checkAuth();

    const form = document.getElementById('login-form');
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const submitBtn = document.getElementById('submit-btn');
    const errorMsg = document.getElementById('error-msg');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      errorMsg.style.display = 'none';
      submitBtn.disabled = true;
      submitBtn.textContent = 'Autenticando...';

      try {
        await login(emailInput.value, passwordInput.value);
        
        // Redirigir a la página previa o al index
        const returnTo = sessionStorage.getItem('returnTo') || 'index.html';
        sessionStorage.removeItem('returnTo');
        window.location.href = returnTo;
        
      } catch (err) {
        errorMsg.textContent = 'Credenciales inválidas o error de conexión.';
        errorMsg.style.display = 'block';
        submitBtn.disabled = false;
        submitBtn.textContent = 'Entrar';
      }
    });
  </script>

</body>
</html>
