<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Iniciar Sesión — SofTrafing Velocidades</title>
  <link rel="icon" href="Images/LogoTrafing.png" type="image/png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    :root {
      --brand: #F46327;
      --brand-hover: #e0551c;
      --brand-glow: rgba(244, 99, 39, 0.20);
      --brand-gradient: linear-gradient(90deg, #F46327, #FF8A5C);
      --slate-200: #E2E8F0;
      --slate-500: #64748B;
      --slate-600: #475569;
      --slate-800: #1E293B;
      --slate-900: #0F172A;
      --red: #DC2626;
      --radius: 16px;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      min-height: 100vh;
    }

    .login-overlay {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, var(--slate-900) 0%, var(--slate-800) 100%);
    }

    .login-box {
      background: white;
      border-radius: var(--radius);
      padding: 40px 36px;
      width: 340px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }

    .login-logo {
      height: 48px;
      margin-bottom: 16px;
    }

    .login-box h2 {
      font-size: 18px;
      font-weight: 700;
      color: var(--slate-800);
      margin: 0 0 20px;
    }

    .login-box .step-hint {
      font-size: 13px;
      color: var(--slate-600);
      margin: -6px 0 14px;
      line-height: 1.4;
    }

    .login-box input {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid var(--slate-200);
      border-radius: 8px;
      font-size: 14px;
      font-family: 'Inter', sans-serif;
      margin-bottom: 10px;
      box-sizing: border-box;
      transition: border-color 0.2s;
    }

    .login-box input:focus {
      outline: none;
      border-color: var(--brand);
      box-shadow: 0 0 0 3px var(--brand-glow);
    }

    .btn-login {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 8px;
      background: var(--brand-gradient);
      color: white;
      font-size: 14px;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      margin-top: 6px;
      transition: opacity 0.2s;
    }
    .btn-login:hover { opacity: 0.9; }
    .btn-login:disabled { opacity: 0.5; cursor: not-allowed; }

    .btn-link {
      background: none;
      border: none;
      color: var(--slate-500);
      font-size: 12px;
      margin-top: 10px;
      cursor: pointer;
      text-decoration: underline;
      font-family: inherit;
    }

    .login-error {
      color: var(--red);
      font-size: 12px;
      margin-top: 10px;
      min-height: 16px;
    }
  </style>
</head>
<body>

<div class="login-overlay">
  <!-- Paso 1: correo + contraseña -->
  <div class="login-box" id="loginStep1">
    <img src="Images/LogoTrafing.png" alt="SofTrafing" class="login-logo">
    <h2>Iniciar Sesión</h2>
    <input type="email" id="loginUser" placeholder="Correo electrónico" autocomplete="email">
    <input type="password" id="loginPass" placeholder="Contraseña" autocomplete="current-password">
    <button class="btn-login" id="btnLogin">Entrar</button>
    <div class="login-error" id="loginError"></div>
  </div>

  <!-- Paso 2: código 2FA -->
  <div class="login-box" id="loginStep2" style="display:none">
    <img src="Images/LogoTrafing.png" alt="SofTrafing" class="login-logo">
    <h2>Verificación en dos pasos</h2>
    <p class="step-hint">Escribe el código de 6 dígitos que muestra tu app autenticadora.</p>
    <input type="text" id="loginMfaCode" inputmode="numeric" pattern="[0-9]*" maxlength="6" placeholder="Código de 6 dígitos" autocomplete="one-time-code">
    <button class="btn-login" id="btnMfaVerify">Verificar</button>
    <button type="button" class="btn-link" id="btnMfaCancel">Cancelar</button>
    <div class="login-error" id="loginMfaError"></div>
  </div>
</div>

<script type="module">
  import { login, verifyMfa, checkAuth, logout } from './lib/auth.js';

  // Si ya está logueado, redirigir
  checkAuth();

  const step1 = document.getElementById('loginStep1');
  const step2 = document.getElementById('loginStep2');
  const emailInput = document.getElementById('loginUser');
  const passwordInput = document.getElementById('loginPass');
  const submitBtn = document.getElementById('btnLogin');
  const errorMsg = document.getElementById('loginError');

  const codeInput = document.getElementById('loginMfaCode');
  const verifyBtn = document.getElementById('btnMfaVerify');
  const cancelBtn = document.getElementById('btnMfaCancel');
  const mfaError = document.getElementById('loginMfaError');

  let pending = null;  // { factorId, challengeId }

  function showStep1() {
    step2.style.display = 'none';
    step1.style.display = '';
    pending = null;
    errorMsg.textContent = '';
    setTimeout(() => emailInput.focus(), 50);
  }
  function showStep2() {
    step1.style.display = 'none';
    step2.style.display = '';
    codeInput.value = '';
    mfaError.textContent = '';
    setTimeout(() => codeInput.focus(), 50);
  }

  async function doLogin() {
    errorMsg.textContent = '';
    submitBtn.disabled = true;
    submitBtn.textContent = 'Entrando...';

    try {
      const result = await login(emailInput.value, passwordInput.value);
      if (result.mfaRequired) {
        pending = { factorId: result.factorId, challengeId: result.challengeId };
        showStep2();
        return;
      }
      const returnTo = sessionStorage.getItem('returnTo') || 'index.html';
      sessionStorage.removeItem('returnTo');
      window.location.href = returnTo;
    } catch (err) {
      if (err && err.code === 'no_access') {
        errorMsg.textContent = err.message || 'Tu cuenta no tiene acceso a este módulo.';
      } else {
        errorMsg.textContent = 'Correo o contraseña incorrectos.';
      }
      passwordInput.value = '';
    } finally {
      submitBtn.disabled = false;
      submitBtn.textContent = 'Entrar';
    }
  }

  async function doVerify() {
    mfaError.textContent = '';
    const code = (codeInput.value || '').trim();
    if (!/^\d{6}$/.test(code)) {
      mfaError.textContent = 'Escribe el código de 6 dígitos';
      return;
    }
    if (!pending) {
      mfaError.textContent = 'Sesión expirada. Vuelve a iniciar.';
      setTimeout(showStep1, 1000);
      return;
    }

    verifyBtn.disabled = true;
    verifyBtn.textContent = 'Verificando...';
    try {
      await verifyMfa(pending.factorId, pending.challengeId, code);
      const returnTo = sessionStorage.getItem('returnTo') || 'index.html';
      sessionStorage.removeItem('returnTo');
      window.location.href = returnTo;
    } catch (err) {
      mfaError.textContent = 'Código incorrecto o expirado.';
      codeInput.value = '';
      codeInput.focus();
    } finally {
      verifyBtn.disabled = false;
      verifyBtn.textContent = 'Verificar';
    }
  }

  submitBtn.addEventListener('click', doLogin);
  passwordInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') doLogin(); });
  emailInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') passwordInput.focus(); });

  verifyBtn.addEventListener('click', doVerify);
  codeInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') doVerify(); });
  codeInput.addEventListener('input', () => {
    codeInput.value = codeInput.value.replace(/\D/g, '').slice(0, 6);
  });

  cancelBtn.addEventListener('click', async () => {
    // Cierra la sesión parcial (aal1) que dejó signInWithPassword
    try { await logout(); } catch {}
    showStep1();
  });
</script>

</body>
</html>
