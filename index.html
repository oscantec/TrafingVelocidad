<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#FFFFFF">
  <title>Softrafing Velocidades — NextCan Tráfico</title>
  <meta name="description" content="Sistema de tracking GPS y procesamiento de recorridos para ingeniería de tráfico — NextCan">
  <link rel="icon" href="Images/Softrafingvel.png" type="image/png">
  <link rel="manifest" href="manifest.webmanifest">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script type="module" src="lib/auth.js"></script>

  <style>
    :root {
      --bg:           #F3F5F8;
      --surface:      #FFFFFF;
      --surface-alt:  #F8FAFC;
      --border:       #E4E8EE;
      --border-soft:  #EEF1F5;

      --text:         #0F172A;
      --text-soft:    #475569;
      --text-muted:   #94A3B8;

      --accent:       #F05A1A;
      --accent-soft:  #FFF1E8;
      --accent-hover: #D94E14;

      --r-sm: 6px;
      --r-md: 10px;
      --r-lg: 14px;
      --r-xl: 18px;

      --shadow-sm: 0 1px 2px rgba(15, 23, 42, 0.04);
      --shadow-md: 0 4px 14px rgba(15, 23, 42, 0.06);
      --shadow-lg: 0 10px 30px rgba(15, 23, 42, 0.08);

      --ease: cubic-bezier(0.16, 1, 0.3, 1);

      --safe-top:    env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 14px;
      color: var(--text);
      background: var(--bg);
      line-height: 1.5;
      overflow-x: hidden;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    a { color: inherit; text-decoration: none; }
    img { display: block; max-width: 100%; }

    /* ── Hero ─────────────────────────────────────────── */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px 60px;
    }

    .hero {
      width: 100%;
      max-width: 920px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    .brand-logo {
      margin-bottom: 32px;
      animation: slide-up 0.5s var(--ease);
    }

    .brand-logo img {
      max-height: 180px;
      width: auto;
      object-fit: contain;
    }

    .hero-title {
      font-size: 30px;
      font-weight: 800;
      letter-spacing: -0.03em;
      color: var(--text);
      margin-bottom: 36px;
      line-height: 1.1;
      animation: slide-up 0.5s 0.05s var(--ease) backwards;
    }

    .hero-title em {
      font-style: normal;
      color: var(--accent);
    }

    /* ── Module Grid ──────────────────────────────────── */
    .module-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
      width: 100%;
      max-width: 820px;
      animation: slide-up 0.5s 0.15s var(--ease) backwards;
    }

    .module-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r-xl);
      text-align: center;
      box-shadow: var(--shadow-sm);
      transition: transform 220ms var(--ease), box-shadow 220ms var(--ease), border-color 220ms var(--ease);
      position: relative;
      overflow: hidden;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: stretch;
    }

    .module-card:hover {
      transform: translateY(-4px);
      border-color: var(--accent);
      box-shadow: var(--shadow-lg);
    }
    .module-card:active { transform: translateY(-1px); }

    /* Orange banner on top of each card */
    .module-hero {
      background: var(--accent);
      color: #fff;
      padding: 36px 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: filter 200ms var(--ease);
    }
    .module-card:hover .module-hero { filter: brightness(1.04); }

    .module-hero svg {
      width: 54px;
      height: 54px;
      stroke: #fff;
    }

    .module-label {
      padding: 22px 20px 26px;
      font-size: 20px;
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text);
    }

    /* ── Footer ───────────────────────────────────────── */
    .footer {
      padding: 14px 20px;
      padding-bottom: calc(14px + var(--safe-bottom));
      background: var(--surface);
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-muted);
      font-weight: 600;
    }
    .footer img {
      height: 22px;
      width: auto;
    }

    /* ── Animations ───────────────────────────────────── */
    @keyframes slide-up {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Responsive (mobile-first tuning) ─────────────── */
    @media (max-width: 720px) {
      .main { padding: 24px 16px 40px; }

      .brand-logo { margin-bottom: 22px; }
      .brand-logo img { max-height: 120px; }

      .hero-title { font-size: 24px; margin-bottom: 26px; }

      .module-grid {
        grid-template-columns: 1fr;
        gap: 14px;
      }

      .module-hero { padding: 28px 16px; }
      .module-hero svg { width: 44px; height: 44px; }
      .module-label { padding: 16px 16px 20px; font-size: 17px; }
    }
  </style>
</head>

<body>

  <!-- ══════════════ HERO + MODULES ══════════════ -->
  <main class="main">
    <div class="hero">

      <div class="brand-logo">
        <img src="Images/Softrafingvel.png" alt="Softrafing Velocidades">
      </div>

      <div class="module-grid">

        <!-- Módulo 1: Captura -->
        <a href="capture/capture.html" class="module-card" id="module-capture">
          <div class="module-hero">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/>
              <circle cx="12" cy="10" r="3"/>
            </svg>
          </div>
          <div class="module-label">Captura</div>
        </a>

        <!-- Módulo 2: Procesamiento -->
        <a href="viewer/viewer.html" class="module-card" id="module-viewer">
          <div class="module-hero">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <line x1="18" y1="20" x2="18" y2="10"/>
              <line x1="12" y1="20" x2="12" y2="4"/>
              <line x1="6"  y1="20" x2="6"  y2="14"/>
              <line x1="3"  y1="20" x2="21" y2="20"/>
            </svg>
          </div>
          <div class="module-label">Procesamiento</div>
        </a>

      </div>
    </div>
  </main>

  <div style="position: fixed; bottom: 80px; right: 20px; z-index: 100;">
    <button id="btnLogout" style="background: white; border: 1px solid var(--border); padding: 8px 16px; border-radius: var(--r-md); font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-soft); cursor: pointer; display: flex; align-items: center; gap: 8px; box-shadow: var(--shadow-sm);">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
      Cerrar Sesión
    </button>
  </div>

  <script type="module">
    import { logout } from './lib/auth.js';
    document.getElementById('btnLogout')?.addEventListener('click', logout);
  </script>

  <!-- ══════════════ FOOTER ══════════════ -->
  <footer class="footer">
    <span>Powered by</span>
    <img src="Images/LogoNextCan.png" alt="NextCan">
  </footer>

  <script>
    if ('serviceWorker' in navigator && location.protocol !== 'file:') {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').catch((err) => {
          console.warn('[SW] Registration failed:', err);
        });
      });
    }
  </script>
</body>
</html>
